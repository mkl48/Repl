[package]
name = "kr3ative/repl"
version = "0.1.0"
description = "An in-game command bar for Roblox, backed by a real shell."
license = "MIT"
authors = ["kr3ative"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
# Switch (input), Substance (networking), and Fusion (UI) are vendored under
# src/_Packages so Repl ships self-contained and the installer bundles everything.
# Fusion is elttob/fusion 0.3.0 (v0.3-beta, scoped API); Substance is
# ker/substance 0.1.0 (typed networking, used for shared commands). Uncomment
# for Wally-managed copies instead.
# Switch = "ker/switch@0.1.0"
# Substance = "ker/substance@0.1.0"
# Fusion = "elttob/fusion@0.3.0"
